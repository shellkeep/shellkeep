name: Feature Request
description: Suggest a new feature or improvement for shellkeep
title: "[Feature]: "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature. Please describe the problem you are
        trying to solve and the solution you would like.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What is your use case?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you would like.
      placeholder: "It would be great if shellkeep could..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or workarounds you have considered.
    validations:
      required: false

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which area of shellkeep would this feature affect?
      options:
        - Connection / SSH
        - Session Management
        - Terminal
        - UI / UX
        - State / Persistence
        - Configuration
        - CLI
        - Packaging / Distribution
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Is this within the v1 scope or a future idea?
      options:
        - Within v1 scope
        - Post-v1 / Future idea
        - Not sure
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, mockups, or references.
    validations:
      required: false
