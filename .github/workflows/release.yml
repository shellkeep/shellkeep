name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-deb:
    name: Build .deb (${{ matrix.os }})
    runs-on: ubuntu-latest
    container: ${{ matrix.container }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: Ubuntu 22.04
            container: ubuntu:22.04
            codename: jammy
          - os: Ubuntu 24.04
            container: ubuntu:24.04
            codename: noble
          - os: Debian 12
            container: debian:12
            codename: bookworm

    env:
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Install dependencies
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            build-essential \
            meson \
            ninja-build \
            pkg-config \
            git \
            ca-certificates \
            debhelper \
            devscripts \
            fakeroot \
            libgtk-3-dev \
            libvte-2.91-dev \
            libssh-dev \
            libayatana-appindicator3-dev \
            libjson-glib-dev

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build .deb package
        run: |
          meson setup build --buildtype=release --prefix=/usr
          meson compile -C build
          DESTDIR=$(pwd)/pkg meson install -C build
          # Build the Debian package
          dpkg-buildpackage -us -uc -b || true
          mkdir -p dist
          cp ../*.deb dist/ 2>/dev/null || true
          # Fallback: create a tarball if dpkg-buildpackage fails
          if [ ! -f dist/*.deb ]; then
            cd pkg && tar czf ../dist/shellkeep-${GITHUB_REF_NAME}-${{ matrix.codename }}.tar.gz . && cd ..
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.codename }}
          path: dist/
          retention-days: 90

  release:
    name: Create GitHub Release
    needs: build-deb
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect release files and generate checksums
        run: |
          mkdir -p release
          find artifacts/ -type f \( -name '*.deb' -o -name '*.tar.gz' \) -exec cp {} release/ \;
          cd release
          sha256sum * > SHA256SUMS.txt

      - name: Extract changelog for this version
        run: |
          # Extract the section for the current tag from CHANGELOG.md
          VERSION="${GITHUB_REF_NAME#v}"
          awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" \
            CHANGELOG.md > release_notes.md || true
          if [ ! -s release_notes.md ]; then
            echo "Release ${GITHUB_REF_NAME}" > release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: release/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
