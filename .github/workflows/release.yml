#
# Release
# =======
# Runs on: pushing a version tag (v*)
#
# What it does:
#   Builds all platforms, creates a GitHub Release with downloadable files.
#
# What it produces (on the Releases page):
#   - shellkeep_0.x.0-1_amd64.deb     — Debian/Ubuntu package
#   - shellkeep-v0.x.0-noble.AppImage  — portable Linux (no deps needed)
#   - shellkeep-v0.x.0-noble.tar.gz    — lightweight Linux (needs system libs)
#   - shellkeep-v0.x.0-macos.zip       — macOS app bundle
#   - shellkeep-v0.x.0-windows.zip     — Windows binary + DLLs
#   - SHA256SUMS.txt                   — checksums for all files

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write


jobs:
  # ----------------------------------------------------------------
  # Linux: .deb + portable tarball + AppImage
  # ----------------------------------------------------------------

  linux:
    name: Linux (${{ matrix.codename }})
    runs-on: ubuntu-latest
    container: ${{ matrix.container }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - codename: noble
            container: ubuntu:24.04
          - codename: bookworm
            container: debian:12

    env:
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Install dependencies
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config \
            git ca-certificates curl \
            debhelper devscripts fakeroot \
            qt6-base-dev libgl-dev \
            libssh-dev libglib2.0-dev libjson-glib-dev libsystemd-dev \
            file libfuse2 patchelf
          apt-get install -y --no-install-recommends \
            libqtermwidget6-2-dev qtermwidget6-data 2>/dev/null || true

      - uses: actions/checkout@v6

      - name: Build
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DSK_BUILD_QT_UI=ON \
            -DSK_JOURNALD=ON
          cmake --build build

      - name: Build .deb
        run: |
          mkdir -p dist
          dpkg-buildpackage -us -uc -b || true
          cp ../*.deb dist/ 2>/dev/null || true

      - name: Build portable tarball
        run: |
          ARCH=$(uname -m)
          mkdir -p pkg-portable/shellkeep

          cp build/shellkeep pkg-portable/shellkeep/shellkeep-bin
          cp scripts/shellkeep-wrapper.sh pkg-portable/shellkeep/shellkeep
          chmod +x pkg-portable/shellkeep/shellkeep pkg-portable/shellkeep/shellkeep-bin

          cp data/shellkeep.desktop pkg-portable/shellkeep/
          cp data/icons/shellkeep-256.png pkg-portable/shellkeep/shellkeep.png
          cp man/shellkeep.1 pkg-portable/shellkeep/

          tar czf "dist/shellkeep-${GITHUB_REF_NAME}-${{ matrix.codename }}-${ARCH}.tar.gz" -C pkg-portable shellkeep

      - name: Build AppImage
        run: |
          DESTDIR=$(pwd)/AppDir cmake --install build
          ARCH=$(uname -m)

          curl -fsSL -o linuxdeploy-${ARCH}.AppImage \
            "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-${ARCH}.AppImage"
          curl -fsSL -o linuxdeploy-plugin-qt-${ARCH}.AppImage \
            "https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-${ARCH}.AppImage"
          chmod +x linuxdeploy-${ARCH}.AppImage linuxdeploy-plugin-qt-${ARCH}.AppImage

          APPIMAGE_EXTRACT_AND_RUN=1 \
          QMAKE="$(which qmake6 2>/dev/null || which qmake 2>/dev/null)" \
          OUTPUT="dist/shellkeep-${GITHUB_REF_NAME}-${{ matrix.codename }}-${ARCH}.AppImage" \
          ./linuxdeploy-${ARCH}.AppImage \
            --appdir AppDir \
            --desktop-file AppDir/usr/share/applications/shellkeep.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/256x256/apps/shellkeep.png \
            --plugin qt \
            --output appimage

          chmod +x dist/*.AppImage

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-linux-${{ matrix.codename }}
          path: dist/
          retention-days: 90

  # ----------------------------------------------------------------
  # macOS: .app bundle as .zip
  # ----------------------------------------------------------------

  macos:
    name: macOS
    runs-on: macos-14

    steps:
      - name: Install dependencies
        run: brew install cmake ninja pkg-config qt@6 libssh glib json-glib

      - uses: actions/checkout@v6

      - name: Build
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=$(brew --prefix qt@6) \
            -DSK_BUILD_QT_UI=ON
          cmake --build build

      - name: Create .zip
        run: |
          mkdir -p dist
          macdeployqt build/shellkeep.app -dmg || true
          cp build/*.dmg dist/ 2>/dev/null || true
          if [ ! -f dist/*.dmg ]; then
            cd build && zip -r ../dist/shellkeep-${GITHUB_REF_NAME}-macos.zip shellkeep.app && cd ..
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-macos
          path: dist/
          retention-days: 90

  # ----------------------------------------------------------------
  # Windows: .exe + Qt6 DLLs as .zip
  # ----------------------------------------------------------------

  windows:
    name: Windows
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-pkg-config
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-libssh
            mingw-w64-ucrt-x86_64-glib2
            mingw-w64-ucrt-x86_64-json-glib

      - uses: actions/checkout@v6

      - name: Build
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DSK_BUILD_QT_UI=ON
          cmake --build build

      - name: Create .zip
        shell: pwsh
        run: |
          mkdir dist
          Copy-Item build\shellkeep.exe dist\
          $msysBin = "D:\a\_temp\msys64\ucrt64\bin"
          $dlls = & "$msysBin\ldd.exe" build/shellkeep.exe 2>$null | Select-String "ucrt64" | ForEach-Object { ($_ -split '\s+')[2] }
          foreach ($dll in $dlls) { Copy-Item $dll dist\ -ErrorAction SilentlyContinue }
          Compress-Archive -Path dist\* -DestinationPath "dist/shellkeep-$env:GITHUB_REF_NAME-windows.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-windows
          path: dist/*.zip
          retention-days: 90

  # ----------------------------------------------------------------
  # Collect everything and create GitHub Release
  # ----------------------------------------------------------------

  publish:
    name: Publish GitHub Release
    if: always()
    needs: [linux, macos, windows]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Collect release files
        run: |
          mkdir -p release
          find artifacts/ -type f \( -name '*.deb' -o -name '*.AppImage' -o -name '*.tar.gz' -o -name '*.dmg' -o -name '*.zip' \) -exec cp {} release/ \;
          cd release && sha256sum * > SHA256SUMS.txt

      - name: Extract changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" \
            CHANGELOG.md > release_notes.md || true
          if [ ! -s release_notes.md ]; then
            echo "Release ${GITHUB_REF_NAME}" > release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: release/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
