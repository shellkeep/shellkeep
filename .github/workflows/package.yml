#
# Package
# =======
# Runs on: every push to main (after Build & Test passes)
#
# What it does:
#   Builds downloadable packages for every platform.
#
# What it produces (download from Actions tab):
#   Linux:
#     - shellkeep-noble-x86_64.AppImage   — portable, no deps needed (recommended)
#     - shellkeep-noble-x86_64.tar.gz     — lightweight, needs system Qt6/GLib/libssh
#     - shellkeep_0.x.0-1_amd64.deb       — for apt install (handles deps)
#     (same for bookworm/Debian 12)
#   macOS:
#     - shellkeep-macos-arm64.zip          — app bundle
#   Windows:
#     - shellkeep-windows-x64.zip          — binary + DLLs

name: Package

on:
  push:
    branches: [main]

concurrency:
  group: package-${{ github.ref }}
  cancel-in-progress: true


jobs:
  # ----------------------------------------------------------------
  # Linux: .deb + portable tarball + AppImage
  # ----------------------------------------------------------------

  linux:
    name: Linux (${{ matrix.codename }})
    runs-on: ubuntu-latest
    container: ${{ matrix.container }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - codename: noble
            container: ubuntu:24.04
          - codename: bookworm
            container: debian:12

    env:
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Install dependencies
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config \
            git ca-certificates curl \
            debhelper devscripts fakeroot \
            qt6-base-dev libgl-dev \
            libssh-dev libglib2.0-dev libjson-glib-dev libsystemd-dev \
            file libfuse2 patchelf

      - uses: actions/checkout@v6

      - name: Build
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DSK_BUILD_QT_UI=ON \
            -DSK_BUILD_TESTS=OFF \
            -DSK_JOURNALD=ON
          cmake --build build

      # -- .deb (for apt install ./shellkeep.deb) --

      - name: Build .deb
        run: |
          mkdir -p dist
          dpkg-buildpackage -us -uc -b 2>&1 || true
          cp ../*.deb dist/ 2>/dev/null || true

      # -- Portable tarball (small, tells you what deps are missing) --

      - name: Build portable tarball
        run: |
          ARCH=$(uname -m)
          mkdir -p dist pkg-portable/shellkeep

          cp build/shellkeep pkg-portable/shellkeep/shellkeep-bin
          cp scripts/shellkeep-wrapper.sh pkg-portable/shellkeep/shellkeep
          chmod +x pkg-portable/shellkeep/shellkeep pkg-portable/shellkeep/shellkeep-bin

          cp data/shellkeep.desktop pkg-portable/shellkeep/
          cp data/icons/shellkeep-256.png pkg-portable/shellkeep/shellkeep.png
          cp man/shellkeep.1 pkg-portable/shellkeep/

          tar czf "dist/shellkeep-${{ matrix.codename }}-${ARCH}.tar.gz" -C pkg-portable shellkeep

      # -- AppImage (large, zero dependencies) --

      - name: Build AppImage
        run: |
          DESTDIR=$(pwd)/AppDir cmake --install build
          ARCH=$(uname -m)
          mkdir -p dist

          # Download linuxdeploy and Qt plugin (static builds, not AppImages)
          curl -fsSL -o linuxdeploy-${ARCH}.AppImage \
            "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-${ARCH}.AppImage"
          curl -fsSL -o linuxdeploy-plugin-qt-${ARCH}.AppImage \
            "https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-${ARCH}.AppImage"
          chmod +x linuxdeploy-${ARCH}.AppImage linuxdeploy-plugin-qt-${ARCH}.AppImage

          # Containers lack FUSE — extract and run directly
          APPIMAGE_EXTRACT_AND_RUN=1 \
          QMAKE="$(which qmake6 2>/dev/null || which qmake 2>/dev/null)" \
          OUTPUT="dist/shellkeep-${{ matrix.codename }}-${ARCH}.AppImage" \
          ./linuxdeploy-${ARCH}.AppImage \
            --appdir AppDir \
            --desktop-file AppDir/usr/share/applications/shellkeep.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/256x256/apps/shellkeep.png \
            --plugin qt \
            --output appimage

          chmod +x dist/*.AppImage

      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: linux-${{ matrix.codename }}
          path: dist/
          retention-days: 30

  # ----------------------------------------------------------------
  # macOS: .app bundle as .zip
  # ----------------------------------------------------------------

  macos:
    name: macOS
    runs-on: macos-14

    steps:
      - name: Install dependencies
        run: brew install cmake ninja pkg-config qt@6 libssh glib json-glib

      - uses: actions/checkout@v6

      - name: Build
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=$(brew --prefix qt@6) \
            -DSK_BUILD_QT_UI=ON
          cmake --build build

      - name: Create .zip
        run: |
          mkdir -p dist
          if [ -d build/shellkeep.app ]; then
            cd build && zip -r ../dist/shellkeep-macos-arm64.zip shellkeep.app && cd ..
          else
            cp build/shellkeep dist/shellkeep-macos-arm64
          fi

      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: macos
          path: dist/
          retention-days: 30

  # ----------------------------------------------------------------
  # Windows: .exe + DLLs as .zip (MSYS2/MinGW)
  # ----------------------------------------------------------------

  windows:
    name: Windows
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-pkg-config
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-libssh
            mingw-w64-ucrt-x86_64-glib2
            mingw-w64-ucrt-x86_64-json-glib

      - uses: actions/checkout@v6

      - name: Build
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DSK_BUILD_QT_UI=ON \
            -DSK_BUILD_TESTS=OFF
          cmake --build build

      - name: Create .zip
        shell: pwsh
        run: |
          mkdir dist
          Copy-Item build\shellkeep.exe dist\
          # Bundle required DLLs
          $msysRoot = "D:\a\_temp\msys64\ucrt64\bin"
          $dlls = & ldd build/shellkeep.exe 2>$null | Select-String "ucrt64" | ForEach-Object { ($_ -split '\s+')[2] }
          foreach ($dll in $dlls) { Copy-Item $dll dist\ -ErrorAction SilentlyContinue }
          Compress-Archive -Path dist\* -DestinationPath dist\shellkeep-windows-x64.zip

      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: windows
          path: dist/shellkeep-windows-x64.zip
          retention-days: 30
