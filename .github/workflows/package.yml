#
# Package
# =======
# Runs on: every push to main (after Build & Test passes)
#
# What it does:
#   Builds downloadable packages for every platform.
#
# What it produces (download from Actions tab):
#   - shellkeep-noble.AppImage        — portable Linux binary, no deps needed
#   - shellkeep-bookworm.AppImage     — same, built on Debian 12
#   - shellkeep-noble.tar.gz          — lightweight Linux binary (needs system Qt6/GLib)
#   - shellkeep-bookworm.tar.gz       — same, built on Debian 12
#   - shellkeep-noble.deb             — Debian/Ubuntu package (apt handles deps)
#   - shellkeep-bookworm.deb          — same, for Debian 12
#   - shellkeep-macos.zip             — macOS app bundle
#   - shellkeep-windows.zip           — Windows binary + Qt6 DLLs

name: Package

on:
  push:
    branches: [main]

concurrency:
  group: package-${{ github.ref }}
  cancel-in-progress: true


jobs:
  # ----------------------------------------------------------------
  # Linux: .deb + portable tarball + AppImage
  # ----------------------------------------------------------------

  linux:
    name: Linux (${{ matrix.codename }})
    runs-on: ubuntu-latest
    container: ${{ matrix.container }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - codename: noble
            container: ubuntu:24.04
          - codename: bookworm
            container: debian:12

    env:
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Install dependencies
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config \
            git ca-certificates curl \
            debhelper devscripts fakeroot \
            qt6-base-dev libgl-dev \
            libssh-dev libglib2.0-dev libjson-glib-dev libsystemd-dev \
            file libfuse2 patchelf

      - uses: actions/checkout@v6

      - name: Build
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DSK_BUILD_QT_UI=ON \
            -DSK_BUILD_TESTS=OFF \
            -DSK_JOURNALD=ON
          cmake --build build

      # -- .deb (for apt install ./shellkeep.deb) --

      - name: Build .deb
        run: |
          dpkg-buildpackage -us -uc -b 2>&1 && cp ../*.deb dist/ 2>/dev/null || true
          mkdir -p dist
          cp ../*.deb dist/ 2>/dev/null || true

      # -- Portable tarball (small, tells you what deps are missing) --

      - name: Build portable tarball
        run: |
          ARCH=$(uname -m)
          mkdir -p dist pkg-portable/shellkeep

          cp build/shellkeep pkg-portable/shellkeep/shellkeep-bin
          cp scripts/shellkeep-wrapper.sh pkg-portable/shellkeep/shellkeep
          chmod +x pkg-portable/shellkeep/shellkeep pkg-portable/shellkeep/shellkeep-bin

          cp data/shellkeep.desktop pkg-portable/shellkeep/
          cp data/icons/shellkeep-256.png pkg-portable/shellkeep/shellkeep.png
          cp man/shellkeep.1 pkg-portable/shellkeep/

          tar czf "dist/shellkeep-${{ matrix.codename }}-${ARCH}.tar.gz" -C pkg-portable shellkeep

      # -- AppImage (large, zero dependencies) --

      - name: Build AppImage
        run: |
          DESTDIR=$(pwd)/AppDir cmake --install build
          ARCH=$(uname -m)

          curl -fsSL -o linuxdeploy "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-${ARCH}.AppImage"
          curl -fsSL -o linuxdeploy-plugin-qt "https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-${ARCH}.AppImage"
          chmod +x linuxdeploy linuxdeploy-plugin-qt

          # Containers lack FUSE — extract and run directly
          ./linuxdeploy --appimage-extract >/dev/null 2>&1
          mv squashfs-root linuxdeploy-extracted
          ./linuxdeploy-plugin-qt --appimage-extract >/dev/null 2>&1
          mv squashfs-root linuxdeploy-plugin-qt-extracted
          export PATH="$(pwd)/linuxdeploy-plugin-qt-extracted/usr/bin:$PATH"

          export QMAKE=$(which qmake6 2>/dev/null || which qmake 2>/dev/null)
          export OUTPUT="dist/shellkeep-${{ matrix.codename }}-${ARCH}.AppImage"

          ./linuxdeploy-extracted/AppRun \
            --appdir AppDir \
            --desktop-file AppDir/usr/share/applications/shellkeep.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/256x256/apps/shellkeep.png \
            --plugin qt \
            --output appimage

          chmod +x dist/*.AppImage

      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: linux-${{ matrix.codename }}
          path: dist/
          retention-days: 30

  # ----------------------------------------------------------------
  # macOS: .app bundle as .zip
  # ----------------------------------------------------------------

  macos:
    name: macOS
    runs-on: macos-14
    continue-on-error: true

    steps:
      - name: Install dependencies
        run: brew install cmake ninja pkg-config qt@6 libssh glib json-glib

      - uses: actions/checkout@v6

      - name: Build
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=$(brew --prefix qt@6) \
            -DSK_BUILD_QT_UI=ON
          cmake --build build

      - name: Create .zip
        run: |
          mkdir -p dist
          if [ -d build/shellkeep.app ]; then
            cd build && zip -r ../dist/shellkeep-macos-arm64.zip shellkeep.app && cd ..
          else
            cp build/shellkeep dist/shellkeep-macos-arm64
          fi

      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: macos
          path: dist/
          retention-days: 30

  # ----------------------------------------------------------------
  # Windows: .exe + Qt6 DLLs as .zip
  # ----------------------------------------------------------------

  windows:
    name: Windows
    runs-on: windows-latest
    continue-on-error: true

    steps:
      - name: Install dependencies
        run: |
          choco install cmake ninja -y
          vcpkg install qt6-base libssh glib json-glib --triplet x64-windows
        env:
          VCPKG_ROOT: C:\vcpkg

      - uses: actions/checkout@v6

      - name: Build
        run: |
          cmake -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DSK_BUILD_QT_UI=ON `
            -DCMAKE_TOOLCHAIN_FILE=C:\vcpkg\scripts\buildsystems\vcpkg.cmake
          cmake --build build

      - name: Create .zip
        run: |
          mkdir dist
          Copy-Item build\shellkeep.exe dist\
          windeployqt dist\shellkeep.exe 2>$null
          Compress-Archive -Path dist\* -DestinationPath dist\shellkeep-windows-x64.zip
        continue-on-error: true

      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: windows
          path: dist/
          retention-days: 30
