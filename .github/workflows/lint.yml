name: Lint

on:
  pull_request:
    branches: [main]
    paths:
      - '**.c'
      - '**.cpp'
      - '**.h'
      - '.clang-format'
      - '.clang-tidy'
      - '.github/workflows/lint.yml'

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true


jobs:
  clang-format:
    name: clang-format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install clang-format
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends clang-format

      - name: Check formatting
        run: |
          find src/ include/ tests/ -name '*.c' -o -name '*.h' -o -name '*.cpp' | \
            xargs clang-format --dry-run --Werror

  cppcheck:
    name: cppcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cppcheck \
            qt6-base-dev \
            libssh-dev \
            libglib2.0-dev \
            libjson-glib-dev

      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=warning,style,performance,portability \
            --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --inline-suppr \
            -I include/ \
            src/

  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang-tidy cmake ninja-build pkg-config \
            qt6-base-dev libgl-dev \
            libssh-dev libglib2.0-dev libjson-glib-dev \
            libcmocka-dev

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DSK_BUILD_TESTS=ON -DSK_BUILD_QT_UI=ON

      - name: Run clang-tidy
        run: |
          cd build
          find ../src/ ../include/ -name '*.c' -o -name '*.cpp' -o -name '*.h' | \
            xargs clang-tidy -p . --warnings-as-errors='*' || true
        continue-on-error: true

  reuse:
    name: REUSE compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install reuse tool
        run: pip install reuse
      - name: Check REUSE compliance
        run: reuse lint
        continue-on-error: true
