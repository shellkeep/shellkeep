#
# Security Scan
# =============
# Runs on: pushes to main, PRs touching C/C++, weekly (Monday 06:00 UTC)
#
# What it does:
#   GitHub CodeQL scans for security vulnerabilities and code quality
#   issues in C/C++ source. Results appear in the Security tab.
#
# What it produces:
#   - nothing (findings go to GitHub Security tab)

name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - '**.c'
      - '**.cpp'
      - '**.h'
  schedule:
    - cron: '0 6 * * 1'

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true


jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config \
            qt6-base-dev libgl-dev \
            libssh-dev libglib2.0-dev libjson-glib-dev

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: c-cpp
          queries: security-and-quality

      - name: Build
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DSK_BUILD_QT_UI=ON
          cmake --build build

      - name: Run analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:c-cpp"
