name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ubuntu-latest
    container: ${{ matrix.container }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: Ubuntu 22.04
            container: ubuntu:22.04
          - os: Ubuntu 24.04
            container: ubuntu:24.04
          - os: Debian 12
            container: debian:12

    env:
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Install system dependencies
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            build-essential \
            meson \
            ninja-build \
            pkg-config \
            git \
            ca-certificates \
            libgtk-3-dev \
            libvte-2.91-dev \
            libssh-dev \
            libayatana-appindicator3-dev \
            libjson-glib-dev \
            libcmocka-dev \
            gcovr \
            lcov \
            clang \
            libasan6 \
            libubsan1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure (debug + coverage)
        run: |
          meson setup build \
            --buildtype=debug \
            -Db_coverage=true \
            -Db_sanitize=address,undefined \
            -Dwerror=true

      - name: Build
        run: meson compile -C build

      - name: Run unit tests
        run: meson test -C build --suite unit --print-errorlogs --timeout-multiplier 3

      - name: Run integration tests
        run: meson test -C build --suite integration --print-errorlogs --timeout-multiplier 5
        continue-on-error: true

      - name: Generate coverage report
        if: matrix.os == 'Ubuntu 24.04'
        run: |
          ninja -C build coverage-html
          ninja -C build coverage-xml || true

      - name: Upload coverage
        if: matrix.os == 'Ubuntu 24.04'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/meson-logs/coveragereport/
          retention-days: 14

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.os }}
          path: build/meson-logs/
          retention-days: 7
