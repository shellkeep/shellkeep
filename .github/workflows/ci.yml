#
# Build & Test
# ============
# Runs on: every push to main, every pull request
#
# What it does:
#   1. Compiles shellkeep on Linux, macOS, and Windows
#   2. Runs unit and integration tests
#
# What it produces:
#   - nothing (build verification only)
#   - test logs uploaded on failure

name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true


jobs:
  build-linux:
    name: ${{ matrix.os }}
    runs-on: ubuntu-latest
    container: ${{ matrix.container }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: Ubuntu 24.04
            container: ubuntu:24.04
            codename: noble
          - os: Debian 12
            container: debian:12
            codename: bookworm

    env:
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Install dependencies
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config \
            git ca-certificates \
            qt6-base-dev libgl-dev \
            libssh-dev libglib2.0-dev libjson-glib-dev \
            libcmocka-dev libsystemd-dev \
            file

      - uses: actions/checkout@v6

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DSK_BUILD_TESTS=ON \
            -DSK_BUILD_QT_UI=ON \
            -DSK_JOURNALD=ON

      - name: Build
        run: cmake --build build

      - name: Unit tests
        run: ctest --test-dir build --label-regex unit --output-on-failure --timeout 120

      - name: Integration tests
        run: ctest --test-dir build --label-regex integration --output-on-failure --timeout 300
        continue-on-error: true

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-logs-${{ matrix.codename }}
          path: build/Testing/
          retention-days: 7

  build-macos:
    name: macOS
    runs-on: macos-14

    steps:
      - name: Install dependencies
        run: brew install cmake ninja pkg-config qt@6 libssh glib json-glib cmocka

      - uses: actions/checkout@v6

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=$(brew --prefix qt@6) \
            -DSK_BUILD_TESTS=ON \
            -DSK_BUILD_QT_UI=ON

      - name: Build
        run: cmake --build build

      - name: Unit tests
        run: ctest --test-dir build --label-regex unit --output-on-failure --timeout 120

      - name: Integration tests
        run: ctest --test-dir build --label-regex integration --output-on-failure --timeout 300
        continue-on-error: true

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-logs-macos
          path: build/Testing/
          retention-days: 7

  build-windows:
    name: Windows
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-pkg-config
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-libssh
            mingw-w64-ucrt-x86_64-glib2
            mingw-w64-ucrt-x86_64-json-glib

      - uses: actions/checkout@v6

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DSK_BUILD_TESTS=OFF \
            -DSK_BUILD_QT_UI=ON

      - name: Build
        run: cmake --build build
