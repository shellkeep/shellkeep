#
# Build & Test
# ============
# Runs on: every push to main, every pull request
#
# What it does:
#   1. Compiles shellkeep on Linux, macOS, and Windows
#   2. Runs unit and integration tests
#
# What it produces:
#   - nothing (build verification only)
#   - test logs uploaded on failure

name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true


jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    continue-on-error: ${{ matrix.experimental || false }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: Ubuntu 24.04
            runner: ubuntu-latest
            container: ubuntu:24.04
            codename: noble
          - os: Debian 12
            runner: ubuntu-latest
            container: debian:12
            codename: bookworm
          - os: macOS
            runner: macos-14
            container: ''
            codename: macos
            experimental: true
          - os: Windows
            runner: windows-latest
            container: ''
            codename: windows
            experimental: true

    env:
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config \
            git ca-certificates \
            qt6-base-dev libgl-dev \
            libssh-dev libglib2.0-dev libjson-glib-dev \
            libcmocka-dev libsystemd-dev \
            file

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja pkg-config qt@6 libssh glib json-glib cmocka

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install cmake ninja -y
          vcpkg install qt6-base libssh glib json-glib cmocka --triplet x64-windows
        env:
          VCPKG_ROOT: C:\vcpkg

      - uses: actions/checkout@v6

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DSK_BUILD_TESTS=ON \
            -DSK_BUILD_QT_UI=ON \
            -DSK_JOURNALD=ON

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=$(brew --prefix qt@6) \
            -DSK_BUILD_TESTS=ON \
            -DSK_BUILD_QT_UI=ON

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DSK_BUILD_TESTS=ON `
            -DSK_BUILD_QT_UI=ON `
            -DCMAKE_TOOLCHAIN_FILE=C:\vcpkg\scripts\buildsystems\vcpkg.cmake

      - name: Build
        run: cmake --build build

      - name: Unit tests
        run: ctest --test-dir build --label-regex unit --output-on-failure --timeout 120

      - name: Integration tests
        run: ctest --test-dir build --label-regex integration --output-on-failure --timeout 300
        continue-on-error: true

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-logs-${{ matrix.codename }}
          path: build/Testing/
          retention-days: 7
