name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: Ubuntu 24.04
            runner: ubuntu-latest
            container: ubuntu:24.04
          - os: Debian 12
            runner: ubuntu-latest
            container: debian:12
          - os: macOS
            runner: macos-14
            container: ''
            experimental: true
          - os: Windows
            runner: windows-latest
            container: ''
            experimental: true

    continue-on-error: ${{ matrix.experimental || false }}

    env:
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            git \
            ca-certificates \
            qt6-base-dev \
            libgl-dev \
            libssh-dev \
            libglib2.0-dev \
            libjson-glib-dev \
            libcmocka-dev \
            gcovr \
            lcov \
            clang \
            libasan6 \
            libubsan1

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja pkg-config qt@6 libssh glib json-glib cmocka

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install cmake ninja -y
          vcpkg install qt6-base libssh glib json-glib cmocka --triplet x64-windows
        env:
          VCPKG_ROOT: C:\vcpkg

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure (debug + tests)
        if: runner.os != 'Windows'
        run: |
          CMAKE_EXTRA=""
          if [ "$RUNNER_OS" = "macOS" ]; then
            CMAKE_EXTRA="-DCMAKE_PREFIX_PATH=$(brew --prefix qt@6)"
          fi
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DSK_BUILD_TESTS=ON \
            -DSK_BUILD_QT_UI=ON \
            $CMAKE_EXTRA

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Debug `
            -DSK_BUILD_TESTS=ON `
            -DSK_BUILD_QT_UI=ON `
            -DCMAKE_TOOLCHAIN_FILE=C:\vcpkg\scripts\buildsystems\vcpkg.cmake

      - name: Build
        run: cmake --build build

      - name: Run backend unit tests
        run: ctest --test-dir build --label-regex unit --output-on-failure --timeout 120

      - name: Run integration tests
        run: ctest --test-dir build --label-regex integration --output-on-failure --timeout 300
        continue-on-error: true

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.os }}
          path: build/Testing/
          retention-days: 7
