[general]
client_id = "my-laptop"
theme = "dark"
startup_behavior = "last_session"

[terminal]
font_family = "JetBrains Mono"
font_size = 14
scrollback_lines = 50000
bell = "none"
cursor_shape = "ibeam"
cursor_blink = "on"
bold_is_bright = false

[ssh]
connect_timeout = 30
keepalive_interval = 20
keepalive_count_max = 5
reconnect_max_attempts = 20
reconnect_backoff_base = 3.0

[keybindings]
new_tab = "Ctrl+T"
close_tab = "Ctrl+W"

[state]
history_max_size_mb = 100
history_max_days = 180
auto_save_interval = 60

[tray]
enabled = false
close_to_tray = false
start_minimized = true
