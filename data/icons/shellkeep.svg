<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- Rounded rectangle clip for the overall icon shape -->
    <clipPath id="iconClip">
      <rect width="256" height="256" rx="42" ry="42"/>
    </clipPath>
    <!-- Subtle gradient for the terminal background -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2e35"/>
      <stop offset="100%" stop-color="#1a1d22"/>
    </linearGradient>
    <!-- Teal accent gradient -->
    <linearGradient id="tealGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3ddbc4"/>
      <stop offset="100%" stop-color="#1fa88e"/>
    </linearGradient>
    <!-- Shield gradient -->
    <linearGradient id="shieldGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#3ddbc4"/>
      <stop offset="100%" stop-color="#18876e"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <g clip-path="url(#iconClip)">
    <rect width="256" height="256" fill="url(#bgGrad)"/>

    <!-- Subtle scanline texture (3 faint lines) -->
    <line x1="0" y1="85" x2="256" y2="85" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    <line x1="0" y1="128" x2="256" y2="128" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    <line x1="0" y1="171" x2="256" y2="171" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

    <!-- Terminal window frame -->
    <rect x="28" y="36" width="200" height="150" rx="12" ry="12" fill="#15181c" stroke="#3a3f48" stroke-width="2"/>

    <!-- Title bar -->
    <rect x="28" y="36" width="200" height="28" rx="12" ry="12" fill="#2f343c"/>
    <!-- Flatten bottom corners of title bar -->
    <rect x="28" y="52" width="200" height="12" fill="#2f343c"/>

    <!-- Title bar dots -->
    <circle cx="46" cy="50" r="5" fill="#e06c75"/>
    <circle cx="62" cy="50" r="5" fill="#e5c07b"/>
    <circle cx="78" cy="50" r="5" fill="#56b870"/>

    <!-- Terminal prompt line 1: $ ssh server -->
    <!-- Prompt chevron -->
    <polygon points="42,82 52,89 42,96" fill="url(#tealGrad)"/>
    <!-- Cursor-style underline for active feel -->
    <rect x="60" y="83" width="48" height="11" rx="2" fill="#3ddbc4" opacity="0.25"/>
    <rect x="60" y="83" width="48" height="11" rx="2" fill="none" stroke="#3ddbc4" stroke-width="1" opacity="0.5"/>

    <!-- Terminal prompt line 2: connected -->
    <polygon points="42,110 52,117 42,124" fill="#3ddbc4" opacity="0.5"/>
    <rect x="60" y="111" width="72" height="11" rx="2" fill="#3ddbc4" opacity="0.12"/>

    <!-- Terminal prompt line 3 (dimmer) -->
    <polygon points="42,138 52,145 42,152" fill="#3ddbc4" opacity="0.25"/>
    <rect x="60" y="139" width="36" height="11" rx="2" fill="#3ddbc4" opacity="0.07"/>

    <!-- Blinking cursor -->
    <rect x="114" y="83" width="3" height="11" fill="#3ddbc4">
      <!-- No animation in static SVG, but the shape suggests a cursor -->
    </rect>

    <!-- Shield in bottom-right, overlapping the terminal slightly -->
    <g transform="translate(168, 138)">
      <!-- Shield shadow -->
      <path d="M32,6 C32,6 56,16 56,16 L56,46 C56,64 32,80 32,80 C32,80 8,64 8,46 L8,16 Z"
            fill="#000000" opacity="0.3" transform="translate(2,2)"/>
      <!-- Shield body -->
      <path d="M32,6 C32,6 56,16 56,16 L56,46 C56,64 32,80 32,80 C32,80 8,64 8,46 L8,16 Z"
            fill="url(#shieldGrad)" stroke="#1a1d22" stroke-width="2"/>
      <!-- Checkmark inside shield -->
      <polyline points="20,42 28,52 44,32" fill="none" stroke="#ffffff" stroke-width="5"
                stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Small chain/link icon at top-right of terminal to hint at persistence -->
    <g transform="translate(190, 38)" opacity="0.6">
      <ellipse cx="8" cy="10" rx="6" ry="9" fill="none" stroke="#3ddbc4" stroke-width="2.5" transform="rotate(-30,8,10)"/>
      <ellipse cx="18" cy="10" rx="6" ry="9" fill="none" stroke="#3ddbc4" stroke-width="2.5" transform="rotate(30,18,10)"/>
    </g>
  </g>
</svg>
